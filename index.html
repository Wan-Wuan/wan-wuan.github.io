<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>探索我的世界 | 个人主页</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #ffffff;
            --accent-color: #00f2fe;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: default;
        }

        body {
            font-family: 'PingFang SC', 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0f0c29; /* 深色底色备用 */
            /* 更加深邃的极光渐变 */
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #0575E6);
            background-size: 400% 400%;
            animation: gradientMove 10s ease infinite;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 背景漂浮装饰球 */
        .circle {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255,255,255,0.3), rgba(255,255,255,0));
            backdrop-filter: blur(5px);
            z-index: 0;
            animation: float 20s infinite linear;
        }
        .c1 { width: 300px; height: 300px; top: -10%; left: -10%; }
        .c2 { width: 200px; height: 200px; bottom: -5%; right: 10%; animation-duration: 15s; }

        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(30px, 50px) rotate(180deg); }
            100% { transform: translate(0, 0) rotate(360deg); }
        }

        /* 毛玻璃容器 */
        .main-card {
            position: relative;
            z-index: 10;
            width: 450px;
            padding: 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
            text-align: center;
            color: white;
            transition: transform 0.3s ease;
        }

        /* 3D 悬浮微动感 */
        .main-card:hover {
            transform: translateY(-10px) rotateX(2deg) rotateY(2deg);
        }

        .avatar-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--accent-color);
            padding: 5px;
            transition: 0.5s;
        }

        /* 在线状态点 */
        .status-dot {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 20px;
            height: 20px;
            background: #4cd137;
            border: 3px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(76, 209, 55, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(76, 209, 55, 0); }
            100% { box-shadow: 0 0 0 0 rgba(76, 209, 55, 0); }
        }

        h1 { font-size: 2rem; letter-spacing: 2px; margin-bottom: 10px; }
        .typing-text { font-size: 0.9rem; color: var(--accent-color); font-weight: bold; margin-bottom: 20px; }

        /* 技能标签排版 */
        .tags {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tag {
            background: rgba(255,255,255,0.1);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* 导航按钮列表 */
        .nav-links {
            display: grid;
            gap: 15px;
        }

        .nav-btn {
            text-decoration: none;
            color: white;
            background: rgba(255,255,255,0.1);
            padding: 12px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .nav-btn:hover {
            background: rgba(255,255,255,0.25);
            border-color: var(--accent-color);
            padding-left: 20px; /* 侧滑效果 */
        }

        .nav-btn i { font-size: 1.2rem; }

        /* 社交媒体小图标 */
        .social-icons {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .social-icons a {
            color: white;
            font-size: 1.5rem;
            opacity: 0.7;
            transition: 0.3s;
        }

        .social-icons a:hover {
            opacity: 1;
            transform: scale(1.2);
            color: var(--accent-color);
        }

    </style>
</head>
<body>

    <div class="circle c1"></div>
    <div class="circle c2"></div>

    <div class="main-card">
        <div class="avatar-wrapper">
            <img src="芙芙.jpg" alt="Avatar" class="avatar">
            <div class="status-dot"></div>
        </div>

        <h1>晚雾安</h1>
        <div class="typing-text">探索中... 🛸 | 代码、设计与星辰</div>

        <div class="tags">
            <span class="tag"># Python</span>
            <span class="tag"># UI/UX</span>
            <span class="tag"># 旅行爱好者</span>
        </div>

        <nav class="nav-links">
            <a href="https://www.wanwuan.top/blog" class="nav-btn" target="_blank">
                <span><i class="fas fa-terminal"></i> 实验室 (Lab)</span>
                <i class="fas fa-chevron-right"></i>
            </a>
            <a href="https://www.wanwuan.top/blog/article.html" class="nav-btn" target="_blank"> 
                <span><i class="fas fa-feather-alt"></i> 随笔 (Thoughts)</span>
                <i class="fas fa-chevron-right"></i>
            </a>
            <a href="https://www.wanwuan.top/pay.jpg" class="nav-btn" target="_blank">
                <span><i class="fas fa-coffee"></i> 赞助我一杯咖啡吧，球球了</span>
                <i class="fas fa-chevron-right"></i>
            </a>
        </nav>

        <div class="social-icons">
            <a href="https://github.com/Wan-Wuan" target="_blank"><i class="fab fa-github"></i></a>
            <a href="https://weixin.qq.com/" target="_blank><i class="fab fa-weixin"></i></a>
            <a href="#"><i class="fab fa-twitter" ></i></a>
            <a href="https://wuanwan86@gmail.com" target="_blank><i class="fas fa-envelope"></i></a>
        </div>
    </div>

</body>
</html>
