<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>奶奶生日快乐</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #000;
      overflow: hidden;
      font-family: "Microsoft YaHei", sans-serif;
    }
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }
    .title {
      position: fixed;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
      font-size: 60px;
      color: #fff;
      text-shadow: 0 0 15px #ffd700, 0 0 30px #ffd700;
      opacity: 0;
      animation: show 3s ease 2s forwards;
      white-space: nowrap;
    }
    .wish {
      position: fixed;
      top: 60%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
      font-size: 28px;
      color: #fff;
      text-shadow: 0 0 10px #ff69b4;
      text-align: center;
      opacity: 0;
      animation: show 3s ease 6s forwards;
    }
    @keyframes show {
      to { opacity: 1; }
    }
  </style>
</head>
<body>

<canvas id="canvas"></canvas>
<div class="title">奶奶生日快乐</div>
<div class="wish">
  祝奶奶身体健康，福寿绵长<br>
  岁岁平安，天天开心 ❤️
</div>

<script>
// 烟花音效（内置，不需要外部文件）
function playSound(freq, dur) {
  const actx = new (window.AudioContext || window.webkitAudioContext)();
  const o = actx.createOscillator();
  const g = actx.createGain();
  o.type = 'sine';
  o.frequency.value = freq;
  o.connect(g);
  g.connect(actx.destination);
  o.start();
  g.gain.setValueAtTime(0.3, actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + dur);
  setTimeout(() => o.stop(), dur * 1000);
}

// 烟花引擎
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

class Particle {
  constructor(x, y, color) {
    this.x = x;
    this.y = y;
    this.speed = Math.random() * 4 + 2;
    this.angle = Math.random() * Math.PI * 2;
    this.vx = Math.cos(this.angle) * this.speed;
    this.vy = Math.sin(this.angle) * this.speed;
    this.alpha = 1;
    this.color = color;
    this.gravity = 0.05;
  }
  update() {
    this.vy += this.gravity;
    this.x += this.vx;
    this.y += this.vy;
    this.alpha -= 0.01;
  }
  draw() {
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.beginPath();
    ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.fill();
    ctx.restore();
  }
}

class Firework {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = canvas.height;
    this.targetY = Math.random() * 200 + 150;
    this.speed = 6;
    this.color = `hsl(${Math.random() * 360}, 100%, 60%)`;
    this.done = false;
    playSound(180, 0.3);
  }
  update() {
    this.y -= this.speed;
    if (this.y <= this.targetY) {
      this.explode();
      this.done = true;
    }
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.fill();
  }
  explode() {
    playSound(120, 0.6);
    for (let i = 0; i < 150; i++) {
      particles.push(new Particle(this.x, this.y, this.color));
    }
  }
}

let fireworks = [];

function loop() {
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (Math.random() < 0.05) {
    fireworks.push(new Firework());
  }

  fireworks = fireworks.filter(f => !f.done);
  fireworks.forEach(f => {
    f.update();
    f.draw();
  });

  particles = particles.filter(p => p.alpha > 0);
  particles.forEach(p => {
    p.update();
    p.draw();
  });

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
